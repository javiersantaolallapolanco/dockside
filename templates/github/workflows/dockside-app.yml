name: Build & Deploy Dockside App

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  APP_NAME: CHANGE_ME
  IMAGE_NAME: CHANGE_ME

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:latest
            ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build

    runs-on:
      - self-hosted
      - qnap
      - dockside

    steps:
      - name: Deploy through Dockside
        run: |
          cd /share/CACHEDEV1_DATA/docker/git/dockside
          chmod +x bin/dockside
          bin/dockside deploy "${APP_NAME}"
